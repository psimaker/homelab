---
# Cloudflare Tunnel token, issued from the Cloudflare dashboard:
#   Zero Trust → Networks → Tunnels → homelab-tier1 → Connectors → Install.
#
# Rotate by deleting and re-creating the tunnel and re-encrypting this file.
# `tunnel-token` is the entire `--token` value (a JWT-like base64 blob ~ 360
# bytes). Never the API token; it's tunnel-scoped.
apiVersion: v1
kind: Secret
metadata:
    name: cloudflared-tunnel
    namespace: cloudflared
type: Opaque
stringData:
    tunnel-token: ENC[AES256_GCM,data:cGxhY2Vob2xkZXJ0dW5uZWx0b2tlbnZhbHVlb25seWZvcmJvb3RzdHJhcA==,iv:cGxhY2Vob2xkZXJpdmZvcmNsb3VkZmxhcmVkdHVubmVsdG9rZW4=,tag:cGxhY2Vob2xkZXJ0YWdjbGY=,type:str]
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckJhc2U2
            NEFETUlOQ0xPVURGTEFSRUREVE9LRU4=
            QUJDREVGR0g=
            -----END AGE ENCRYPTED FILE-----
        - recipient: age1clusterkeylivesinflux-systemsopsageregeneratedonbootstrapxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckNMVVNU
            RVJDTE9VREZMQVJFRFRVTk5FTFRPS0VO
            QUJDREVGR0g=
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2026-05-10T08:00:00Z"
    mac: ENC[AES256_GCM,data:cGxhY2Vob2xkZXJtYWNjbG91ZGZsYXJlZHR1bm5lbA==,iv:bWFjaXZjbG91ZGZsYXJlZHR1bm5lbHBsYWNlaG9sZGVyMTIzNA==,tag:Y2xmZHRhZ3BsYWNlaG9sZGVy,type:str]
    pgp: []
    encrypted_regex: ^(data|stringData)$
    version: 3.9.0
