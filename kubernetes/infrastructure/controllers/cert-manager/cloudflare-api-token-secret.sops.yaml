---
# Cloudflare API token used by the cert-manager DNS-01 solver to write
# `_acme-challenge` TXT records into the loogi.ch and example.com zones.
#
# Token scope (matches the Cloudflare custom-token template):
#   - Zone:DNS:Edit          on loogi.ch, example.com
#   - Zone:Zone:Read         on loogi.ch, example.com
#
# Rotated every 90 days as part of the Q-quarterly rotation chore. The
# placeholder ciphertext below is structurally valid SOPS output — replace it
# with `sops kubernetes/infrastructure/controllers/cert-manager/cloudflare-api-token-secret.sops.yaml`.
apiVersion: v1
kind: Secret
metadata:
    name: cloudflare-api-token
    namespace: cert-manager
type: Opaque
stringData:
    api-token: ENC[AES256_GCM,data:placeholder0011223344==,iv:V0pNYW5kYXRvcnlQbGFjZWhvbGRlckl2c1Bsc1JlcGxhY2U=,tag:cGxhY2Vob2xkZXJUYWdSZXBsYWNl,type:str]
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckJhc2U2
            NEFCQ0RFRkdISUprbE1OT3BxcnN0
            dXZ3eHl6QUJDRA==
            -----END AGE ENCRYPTED FILE-----
        - recipient: age1clusterkeylivesinflux-systemsopsageregeneratedonbootstrapxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckJhc2U2
            NENMVVNURVJSRUNJUElFTlRBQkNE
            RUZHSElKa2xNTm9wcXJ=
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2026-05-10T08:00:00Z"
    mac: ENC[AES256_GCM,data:cGxhY2Vob2xkZXJtYWN2YWx1ZWZvcmJvb3RzdHJhcA==,iv:bWFjaXZwbGFjZWhvbGRlcnZhbHVlczEyMzQ1Njc4OTBhYmNkZWY=,tag:cGxhY2Vob2xkZXJUYWdN,type:str]
    pgp: []
    encrypted_regex: ^(data|stringData)$
    version: 3.9.0
