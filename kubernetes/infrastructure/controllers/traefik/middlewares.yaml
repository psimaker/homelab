---
# Default middlewares. IngressRoutes opt in by referencing these by name.
# Centralising them here means a one-line tweak (e.g. tightening HSTS) lands
# everywhere on the next reconcile.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: traefik
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    customFrameOptionsValue: SAMEORIGIN
    referrerPolicy: strict-origin-when-cross-origin
    permissionsPolicy: |
      camera=(), microphone=(), geolocation=(), payment=()
    customRequestHeaders:
      X-Forwarded-Proto: https
    customResponseHeaders:
      X-Robots-Tag: noindex,nofollow,nosnippet,noarchive
      Server: ""  # don't leak Traefik version
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: traefik
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1m
    sourceCriterion:
      ipStrategy:
        # Cloudflare's CF-Connecting-IP forwards the real client IP.
        excludedIPs: []
        # Depth 1 because cloudflared inserts exactly one X-Forwarded-For hop.
        depth: 1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Compression is cheap and useful for SearXNG / Grafana.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: traefik
spec:
  compress: {}
---
# Strip /<prefix>/ segments — used by IngressRoutes that path-route a single
# host across multiple backend services (rare but handy).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-trailing-slash
  namespace: traefik
spec:
  redirectRegex:
    regex: ^(.*)/$
    replacement: ${1}
    permanent: false
