---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik
resources:
  - namespace.yaml
  - helm-repository.yaml
  - helm-release.yaml
  - middlewares.yaml
configMapGenerator:
  - name: traefik-helm-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/managed-by: flux
