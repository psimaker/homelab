---
# Renovate authentication tokens.
#
# - gitea-token: Gitea PAT scoped to repo:rw, issue:rw, pull_request:rw on
#   umut.erdem/homelab and umut.erdem/loogi. Generated under the bot account
#   `renovate@git.example.com`, NOT the operator's main user.
# - github-com-token: read-only github.com PAT, used by Renovate to query
#   release notes from public repos without hitting the unauth rate limit.
#
# Rotated every 12 months as part of the quarterly housekeeping checklist.
apiVersion: v1
kind: Secret
metadata:
    name: renovate-secrets
    namespace: renovate
type: Opaque
stringData:
    gitea-token: ENC[AES256_GCM,data:cGxhY2Vob2xkZXJnaXRlYXRva2VucGxhY2Vob2xkZXI=,iv:cGxhY2Vob2xkZXJpdmdpdGVhdG9rZW5yZW5vdmF0ZQ==,tag:cGxhY2Vob2xkZXJ0YWdHaXQ=,type:str]
    github-com-token: ENC[AES256_GCM,data:cGxhY2Vob2xkZXJnaXRodWJ0b2tlbmZvcnJlbm92YXRl,iv:Z2hjb20tcGxhY2Vob2xkZXItaXY=,tag:cGxhY2Vob2xkZXJ0YWdHSA==,type:str]
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckJhc2U2
            NEFETUlOUkVOT1ZBVEVHSVRBQUJDRA==
            -----END AGE ENCRYPTED FILE-----
        - recipient: age1clusterkeylivesinflux-systemsopsageregeneratedonbootstrapxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckNMVVNU
            RVJSRU5PVkFURUdJVEFCQ0Q=
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2026-05-10T08:00:00Z"
    mac: ENC[AES256_GCM,data:cmVub3ZhdGVtYWNwbGFjZWhvbGRlcnZhbHVlMTIzNA==,iv:cmVub3ZhdGVtYWNpdnBsYWNlaG9sZGVy,tag:cmVub3ZhdGV0YWdwbGFjZWhvbGRlcg==,type:str]
    pgp: []
    encrypted_regex: ^(data|stringData)$
    version: 3.9.0
