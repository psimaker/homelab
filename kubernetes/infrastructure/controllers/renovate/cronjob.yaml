---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  labels:
    app.kubernetes.io/name: renovate
    app.kubernetes.io/managed-by: flux
spec:
  # Mondays + Thursdays at 04:00 Europe/Zurich. CronJob respects spec.timeZone
  # since k8s 1.27 (we run 1.31).
  schedule: "0 4 * * 1,4"
  timeZone: "Europe/Zurich"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 5400  # 90 minutes — large repos take a while
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
        spec:
          serviceAccountName: renovate
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 12021
            runAsGroup: 12021
            fsGroup: 12021
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
              image: ghcr.io/renovatebot/renovate:38
              imagePullPolicy: IfNotPresent
              args:
                - --platform=gitea
                - --endpoint=https://git.psimaker.org/api/v1
              env:
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_CONFIG_FILE
                  value: /etc/renovate/config.js
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: gitea-token
                - name: GITHUB_COM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: github-com-token
                - name: TZ
                  value: Europe/Zurich
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false  # renovate writes scratch + git clones
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: config
                  mountPath: /etc/renovate
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: cache
                  mountPath: /home/ubuntu/.cache
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
            - name: cache
              emptyDir:
                sizeLimit: 4Gi
