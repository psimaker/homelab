---
# Placeholder ClusterSecretStore for 1Password Connect. NOT applied today —
# the entire stub is commented out so the kustomize build emits nothing.
#
# To activate, uncomment, then:
#   1. Deploy 1Password Connect (separate Helm release, not in this tree yet)
#   2. Create the credentials secret, encrypted with SOPS:
#        sops -e --input-type=yaml ./onepassword-connect-token.yaml > onepassword-connect-token.sops.yaml
#   3. Reference the resulting Secret name below
#   4. Add this file's name to ./kustomization.yaml resources list
#
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: onepassword
#   labels:
#     app.kubernetes.io/managed-by: flux
# spec:
#   provider:
#     onepassword:
#       connectHost: http://onepassword-connect.external-secrets.svc:8080
#       vaults:
#         homelab: 1
#       auth:
#         secretRef:
#           connectTokenSecretRef:
#             name: onepassword-connect-token
#             namespace: external-secrets
#             key: token

# Placeholder no-op so kustomize build doesn't trip over an empty file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-secrets-stores-readme
  namespace: external-secrets
data:
  readme: |
    No ClusterSecretStores configured yet. SOPS+age remains the default secret
    provider — see docs/adr/0004-secrets-sops-vs-vault.md.
