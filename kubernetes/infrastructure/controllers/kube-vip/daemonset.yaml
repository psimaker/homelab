---
# kube-vip in ARP mode handles the rare LoadBalancer IP that needs L4 reach
# outside the Cilium cluster. The bulk of public traffic flows over the
# Cloudflare Tunnel via Traefik (ClusterIP); LB-mode IPs are reserved for
# things like the Cloudflare Tunnel ClusterIP fallback or future raw-TCP
# services that don't fit Traefik's HTTP-only model.
#
# ARP mode requires kube-vip to run on every node — DaemonSet. We tolerate the
# control-plane taint so it runs on `edge` (the only control-plane node).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kube-vip
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: Exists
      containers:
        - name: kube-vip
          # renovate: datasource=docker depName=ghcr.io/kube-vip/kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.7
          imagePullPolicy: IfNotPresent
          args:
            - manager
          env:
            - name: vip_arp
              value: "true"
            - name: port
              value: "6443"
            - name: vip_cidr
              value: "32"
            - name: cp_enable
              value: "false"  # k3s embedded API HA isn't needed for 1 server
            - name: svc_enable
              value: "true"
            - name: svc_election
              value: "true"
            - name: vip_leaderelection
              value: "true"
            - name: vip_leasename
              value: kube-vip
            - name: vip_leaseduration
              value: "5"
            - name: vip_renewdeadline
              value: "3"
            - name: vip_retryperiod
              value: "1"
            - name: lb_enable
              value: "true"
            - name: enableServicesElection
              value: "true"
            - name: vip_loglevel
              value: "4"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_TIME
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
