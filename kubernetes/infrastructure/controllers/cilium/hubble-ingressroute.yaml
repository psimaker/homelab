---
# Hubble UI on the tailnet. Tinyauth is attached as a forward-auth middleware,
# so even on the tailnet a clear-text MagicDNS name needs SSO before serving.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hubble-ui
  namespace: kube-system
  annotations:
    homelab.psimaker.org/exposure: tailnet-only
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hubble.tailnet`)
      kind: Rule
      services:
        - name: hubble-ui
          port: 80
      middlewares:
        - name: tinyauth-forward-auth
          namespace: identity
        - name: secure-headers
          namespace: traefik
  tls:
    secretName: hubble-ui-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hubble-ui-tls
  namespace: kube-system
spec:
  secretName: hubble-ui-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: hubble.tailnet
  dnsNames:
    - hubble.tailnet
  duration: 2160h     # 90d
  renewBefore: 360h   # 15d
