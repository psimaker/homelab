---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headscale
  namespace: identity
spec:
  interval: 30m
  releaseName: headscale
  chart:
    spec:
      chart: headscale
      # renovate: datasource=helm depName=headscale registryUrl=https://charts.gabe565.com
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: gabe565
        namespace: identity
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: headscale-helm-values
      valuesKey: values.yaml
    - kind: ConfigMap
      name: headscale-acl
      valuesKey: acl.hujson
      targetPath: configuration.acl_policy
