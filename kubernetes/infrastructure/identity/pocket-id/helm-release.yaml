---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
  namespace: identity
spec:
  interval: 30m
  releaseName: pocket-id
  chart:
    spec:
      chart: pocket-id
      # renovate: datasource=helm depName=pocket-id registryUrl=https://pocket-id.org/charts
      version: 0.39.0
      sourceRef:
        kind: HelmRepository
        name: pocket-id
        namespace: identity
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: pocket-id-helm-values
      valuesKey: values.yaml
