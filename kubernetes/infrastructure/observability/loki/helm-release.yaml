---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 30m
  releaseName: loki
  chart:
    spec:
      chart: loki
      # renovate: datasource=helm depName=loki registryUrl=https://grafana.github.io/helm-charts
      version: 6.18.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: loki-helm-values
      valuesKey: values.yaml
