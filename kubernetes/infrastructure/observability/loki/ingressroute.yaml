---
# Loki gateway on the tailnet only. The Docker `loki` log-driver on airbase
# pushes through this gateway via http://loki.tailnet/ — the route below
# strips the host header and forwards to the gateway service.
#
# This is the only Loki surface exposed via Traefik. Direct queries from
# Grafana go via the in-cluster ClusterIP service (no IngressRoute needed).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki
  namespace: observability
  annotations:
    homelab.psimaker.org/exposure: tailnet-only
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`loki.tailnet`)
      kind: Rule
      services:
        - name: loki-gateway
          port: 80
      middlewares:
        - name: secure-headers
          namespace: traefik
  tls:
    secretName: loki-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: loki-tls
  namespace: observability
spec:
  secretName: loki-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: loki.tailnet
  dnsNames:
    - loki.tailnet
  duration: 2160h
  renewBefore: 360h
