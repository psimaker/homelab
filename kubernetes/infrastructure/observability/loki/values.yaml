# Loki simple-scalable mode (1 read, 1 write, 1 backend).
#
# Why simple-scalable: monolithic mode hides failure modes that bite during
# upgrades, microservices mode is overkill for a 2-node cluster. Simple-scalable
# splits read/write/backend cleanly while staying within 3 pods.
#
# Object storage backend: Hetzner Object Storage S3-compat. The endpoint and
# credentials come from the loki-storage-credentials Secret (object-storage-secret.sops.yaml).

deploymentMode: SimpleScalable

loki:
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: psimaker-homelab-loki
      ruler: psimaker-homelab-loki
      admin: psimaker-homelab-loki
    s3:
      endpoint: fsn1.your-objectstorage.com
      region: eu-central-1
      s3ForcePathStyle: true
      insecure: false
      # access_key_id / secret_access_key come from the env vars in
      # `extraEnvFrom` below — Helm renders them in via the Secret reference.

  auth_enabled: false   # single-tenant cluster

  server:
    log_level: info
    log_format: json
    http_listen_port: 3100
    grpc_listen_port: 9095

  limits_config:
    retention_period: 720h  # 30 days
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_query_parallelism: 16
    max_global_streams_per_user: 5000
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    split_queries_by_interval: 15m
    volume_enabled: true
    allow_structured_metadata: true

  compactor:
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 50
    delete_request_store: s3

  ingester:
    chunk_idle_period: 30m
    chunk_target_size: 1572864
    max_chunk_age: 2h

  ruler:
    storage:
      type: s3
    rule_path: /var/loki/rules
    enable_api: true

# Per-component sizing — small, this is a homelab.
write:
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  extraEnvFrom:
    - secretRef:
        name: loki-storage-credentials

read:
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  extraEnvFrom:
    - secretRef:
        name: loki-storage-credentials

backend:
  replicas: 1
  persistence:
    size: 10Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  extraEnvFrom:
    - secretRef:
        name: loki-storage-credentials

gateway:
  enabled: true
  replicas: 1
  basicAuth:
    enabled: false   # we sit behind Tinyauth at the IngressRoute layer

# Disable bundled stuff we don't use
test:
  enabled: false
chunksCache:
  enabled: false   # Memcached not worth the overhead at this scale
resultsCache:
  enabled: false

# kube-prometheus-stack ServiceMonitor labels
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  rules:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack
