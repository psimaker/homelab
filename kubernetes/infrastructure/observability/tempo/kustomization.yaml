---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - helm-repository.yaml
  - helm-release.yaml
  - object-storage-secret.sops.yaml
configMapGenerator:
  - name: tempo-helm-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/managed-by: flux
