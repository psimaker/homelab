---
# Single-binary Tempo. Day-1 we have ~zero traces; this is groundwork.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 30m
  releaseName: tempo
  chart:
    spec:
      chart: tempo
      # renovate: datasource=helm depName=tempo registryUrl=https://grafana.github.io/helm-charts
      version: 1.10.1
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: tempo-helm-values
      valuesKey: values.yaml
