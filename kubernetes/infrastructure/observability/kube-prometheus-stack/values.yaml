# kube-prometheus-stack 65.5.0 — Prometheus + Alertmanager + Grafana +
# node-exporter + kube-state-metrics + the operator.
#
# Notes:
# - We keep retention low (30d). Long-term storage is not a goal here; the
#   homelab is small and 30 days of metrics is plenty for trend analysis.
# - Grafana is OIDC-only (Pocket-ID). No anonymous access. The admin password
#   is randomly generated by the chart on first install and stored in a Secret;
#   we never log in as admin in normal operation.
# - Alertmanager config is rendered from a SOPS-encrypted Secret via valuesFrom
#   in the HelmRelease, because it embeds the ntfy webhook URLs that we don't
#   want in plaintext in case the URL ever encodes auth.

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false   # k3s doesn't expose etcd metrics by default
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # k3s — embedded
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false  # k3s — embedded
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    windows: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    retention: 168h
    logFormat: json
    logLevel: info
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
  # The full config is loaded from the alertmanager-config Secret via
  # HelmRelease valuesFrom.targetPath = alertmanager.config. This block stays
  # empty so Helm renders nothing here.
  config: {}

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 30d
    retentionSize: "28GB"
    scrapeInterval: 30s
    evaluationInterval: 30s
    enableAdminAPI: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi
    additionalScrapeConfigs:
      name: prometheus-additional-scrape
      key: additional-scrape-configs.yaml
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 4Gi
    walCompression: true
    enableFeatures:
      - exemplar-storage  # for Tempo trace-to-metrics linking
      - native-histograms

# Grafana: SSO via Pocket-ID OIDC. Auto-provisioning of common dashboards
# from the chart's bundled set (cluster, node-exporter, kube-state-metrics).
grafana:
  enabled: true
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Zurich
  replicas: 1
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
  service:
    type: ClusterIP
  # We expose Grafana via Traefik IngressRoute (see ingressroute.yaml).
  ingress:
    enabled: false
  grafana.ini:
    server:
      domain: grafana.tailnet
      root_url: "https://grafana.tailnet/"
      enforce_domain: false
    security:
      cookie_secure: true
      cookie_samesite: lax
      strict_transport_security: true
      strict_transport_security_max_age_seconds: 31536000
    auth:
      disable_login_form: false
      disable_signout_menu: false
    auth.basic:
      enabled: false
    auth.anonymous:
      enabled: false
    auth.generic_oauth:
      enabled: true
      name: Pocket-ID
      allow_sign_up: true
      auto_login: false
      client_id: grafana
      # client_secret is patched in by HelmRelease valuesFrom (Secret)
      scopes: openid profile email groups
      empty_scopes: false
      auth_url: https://id.psimaker.org/authorize
      token_url: https://id.psimaker.org/api/oidc/token
      api_url: https://id.psimaker.org/api/oidc/userinfo
      role_attribute_path: |
        contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'editor') && 'Editor' || 'Viewer'
      use_pkce: true
    log:
      mode: console
      level: info
    log.console:
      format: json
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.observability.svc.cluster.local
      jsonData:
        maxLines: 5000
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "trace_id=(\\w+)"
            name: TraceID
            url: "$${__value.raw}"
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3100
      uid: tempo
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          mapTagNamesEnabled: true
          tags:
            - key: service.name
              value: service
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

# kube-state-metrics + node-exporter: keep them.
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

# k3s exclusions
kubeApiServer:
  enabled: true
kubelet:
  enabled: true
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: true   # we kept kube-proxy
kubeEtcd:
  enabled: false  # k3s embeds sqlite or etcd internally; not exposed by default
