---
# Grafana on the tailnet only. Tinyauth covers the OIDC challenge for users
# without active Grafana sessions; Grafana itself also re-validates OIDC.
# Two-factor at the proxy + at the app is intentional: the IngressRoute
# layer is one of the few places we can make sure no service slips out
# without auth.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: observability
  annotations:
    homelab.psimaker.org/exposure: tailnet-only
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.tailnet`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
      middlewares:
        - name: secure-headers
          namespace: traefik
        - name: compress
          namespace: traefik
  tls:
    secretName: grafana-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: observability
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: grafana.tailnet
  dnsNames:
    - grafana.tailnet
  duration: 2160h
  renewBefore: 360h
---
# Prometheus + Alertmanager UIs on the tailnet, behind Tinyauth (no built-in
# auth on either). These are debugging surfaces only; the SLO/alerting flow
# goes through Grafana.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: observability
  annotations:
    homelab.psimaker.org/exposure: tailnet-only
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus.tailnet`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
      middlewares:
        - name: tinyauth-forward-auth
          namespace: identity
        - name: secure-headers
          namespace: traefik
  tls:
    secretName: prometheus-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls
  namespace: observability
spec:
  secretName: prometheus-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: prometheus.tailnet
  dnsNames:
    - prometheus.tailnet
  duration: 2160h
  renewBefore: 360h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: observability
  annotations:
    homelab.psimaker.org/exposure: tailnet-only
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`alertmanager.tailnet`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
      middlewares:
        - name: tinyauth-forward-auth
          namespace: identity
        - name: secure-headers
          namespace: traefik
  tls:
    secretName: alertmanager-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: alertmanager-tls
  namespace: observability
spec:
  secretName: alertmanager-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: alertmanager.tailnet
  dnsNames:
    - alertmanager.tailnet
  duration: 2160h
  renewBefore: 360h
