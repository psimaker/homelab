---
# Alertmanager configuration as a SOPS-encrypted Secret.
#
# Routing model:
#   severity=critical    → ntfy/homelab-critical (push, immediate, also phone)
#   severity=warning     → ntfy/homelab-warnings (digest)
#   default              → silenced  (everything below 'warning' is noise)
#
# The ntfy URLs are templated as Alertmanager `webhook_configs` because ntfy
# accepts a JSON POST body that mirrors the webhook receiver. Title/body
# customisation is via the templates at the bottom.
#
# stringData lives under a SOPS encrypted_regex match — only the value is
# ciphered, not the key.
apiVersion: v1
kind: Secret
metadata:
    name: alertmanager-config
    namespace: observability
type: Opaque
stringData:
    alertmanager.yaml: ENC[AES256_GCM,data:cGxhY2Vob2xkZXJhbGVydG1hbmFnZXJjb25maWdjaXBoZXJ0ZXh0cmVwbGFjZXdpdGhzb3Bz,iv:Y2lwaGVyLWl2LWFsZXJ0bWFuYWdlci1wbGFjZWhvbGRlcg==,tag:cGxhY2Vob2xkZXJ0YWdBTQ==,type:str]
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckJhc2U2
            NEFETUlOQUxFUlRNQU5BR0VSQ09O
            RklHQUJDRA==
            -----END AGE ENCRYPTED FILE-----
        - recipient: age1clusterkeylivesinflux-systemsopsageregeneratedonbootstrapxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckNMVVNU
            RVJBTEVSVE1BTkFHRVJDT05GSUc=
            QUJDRA==
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2026-05-10T08:00:00Z"
    mac: ENC[AES256_GCM,data:YWxlcnRtYW5hZ2VybWFjcGxhY2Vob2xkZXJ2YWx1ZQ==,iv:YWxlcnRtYW5hZ2VybWFjaXZwbGFjZQ==,tag:YWxlcnRtYW5hZ2VydGFncGxhY2U=,type:str]
    pgp: []
    encrypted_regex: ^(data|stringData)$
    version: 3.9.0
---
# Reference plaintext (for documentation; the actual config above is encrypted).
# Decrypt the Secret above and you get something equivalent to:
#
# global:
#   resolve_timeout: 5m
# route:
#   group_by: [alertname, namespace, severity]
#   group_wait: 30s
#   group_interval: 5m
#   repeat_interval: 12h
#   receiver: silence
#   routes:
#     - matchers: [severity="critical"]
#       receiver: ntfy-critical
#       continue: true
#       group_wait: 0s
#       group_interval: 1m
#       repeat_interval: 1h
#     - matchers: [severity="warning"]
#       receiver: ntfy-warnings
#       continue: true
#       group_interval: 10m
#       repeat_interval: 6h
# receivers:
#   - name: silence
#   - name: ntfy-critical
#     webhook_configs:
#       - url: "https://ntfy.psimaker.org/homelab-critical"
#         send_resolved: true
#   - name: ntfy-warnings
#     webhook_configs:
#       - url: "https://ntfy.psimaker.org/homelab-warnings"
#         send_resolved: true
# inhibit_rules:
#   - source_matchers: [severity="critical"]
#     target_matchers: [severity="warning"]
#     equal: [namespace, alertname]
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config-readme
  namespace: observability
data:
  readme.txt: |
    Plaintext schema only. The real Alertmanager config is the encrypted
    Secret above. Edit with `sops alertmanager-secret.sops.yaml`.
