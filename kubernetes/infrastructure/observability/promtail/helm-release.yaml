---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: observability
spec:
  interval: 30m
  releaseName: promtail
  chart:
    spec:
      chart: promtail
      # renovate: datasource=helm depName=promtail registryUrl=https://grafana.github.io/helm-charts
      version: 6.16.6
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  valuesFrom:
    - kind: ConfigMap
      name: promtail-helm-values
      valuesKey: values.yaml
