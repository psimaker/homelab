---
# Beszel hub. Pulls metrics from beszel-agent DaemonSet pods on every node
# (and from any other agent we point at it). Light on dependencies, no
# database container — SQLite on the PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel-hub
  namespace: observability
  labels:
    app.kubernetes.io/name: beszel
    app.kubernetes.io/component: hub
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: Recreate   # SQLite, single-writer
  selector:
    matchLabels:
      app.kubernetes.io/name: beszel
      app.kubernetes.io/component: hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beszel
        app.kubernetes.io/component: hub
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: beszel
          # renovate: datasource=docker depName=henrygd/beszel
          image: henrygd/beszel:0.10.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: APP_URL
              value: https://beszel.tailnet
            - name: PUBLIC_URL
              value: https://beszel.tailnet
            - name: DATA_DIR
              value: /beszel_data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # writes SQLite WAL
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /beszel_data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beszel-data
