---
# The hub-public-key here is the *hub*'s ED25519 public key. Beszel's hub
# generates this on first boot; copy it from the hub UI under Admin → Keys
# and paste the full `ssh-ed25519 AAAA…` line into the encrypted value.
# Agents trust only this key — losing it means re-pairing every agent.
apiVersion: v1
kind: Secret
metadata:
    name: beszel-agent-key
    namespace: observability
type: Opaque
stringData:
    hub-public-key: ENC[AES256_GCM,data:c3NoLWVkMjU1MTktcGxhY2Vob2xkZXItYWdlbnQta2V5LXJlcGxhY2VhZnRlcmJvb3RzdHJhcA==,iv:YmVzemVscGxhY2Vob2xkZXJpdmtleQ==,tag:YmVzemVsdGFnZW50dGFnaw==,type:str]
sops:
    kms: []
    gcp_kms: []
    azure_kv: []
    hc_vault: []
    age:
        - recipient: age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSBQbGFjZWhvbGRlckJhc2U2
            NEFETUlOQkVTWkVMQUdFTlRLRVk=
