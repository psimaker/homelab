---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn-system
resources:
  - namespace.yaml
  - helm-repository.yaml
  - helm-release.yaml
  - storage-class.yaml
  - backup-target-secret.sops.yaml
  - recurring-jobs.yaml
  - servicemonitor.yaml
configMapGenerator:
  - name: longhorn-helm-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/managed-by: flux
