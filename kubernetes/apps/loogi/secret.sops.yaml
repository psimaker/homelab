# LOOGI runtime secret — SOPS-encrypted at rest.
#
# Encrypted with the two recipients in /.sops.yaml (admin + cluster). At apply
# time, Flux's sops-decryptor (using Secret/sops-age in flux-system) materialises
# the cleartext into the cluster. The plaintext form is never committed.
#
# Generating the secret:
#   $ openssl rand -hex 32 | tr -d '\n' | base64 -w0
# Then re-encrypt the file:
#   $ sops --encrypt --in-place kubernetes/apps/loogi/secret.sops.yaml
#
# encrypted_regex in /.sops.yaml is `^(data|stringData)$`, so only those keys
# are encrypted; metadata (name, namespace, labels) stays cleartext for
# kustomize and reviewers.
---
apiVersion: v1
kind: Secret
metadata:
    name: loogi-secret
    namespace: loogi
    labels:
        app.kubernetes.io/name: loogi
        app.kubernetes.io/part-of: loogi
        tier: tier-1
type: Opaque
data:
    # SearXNG Flask session secret. 32 bytes hex (64 chars).
    SEARXNG_SECRET: ENC[AES256_GCM,data:j5R3Xc1qY8wFhP2vBn7tLm4kQzAeWrU6sDpIfHgT5oV9CxZbN0aJyME=,iv:2k7Hx3pZ4oRtY9bFnW8mAeSjLcVqUgN1yPwDxKhTrM4=,tag:8wPx9LkRvNqA4mZbT5cFhE==,type:str]
sops:
    age:
        - recipient: age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
