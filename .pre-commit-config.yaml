# Run with:  pre-commit install   (then it runs automatically on every git commit)
# Manual:    pre-commit run --all-files
#
# The same hooks run in CI (.gitea/workflows/lint.yml) so they are not optional.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(kubernetes/.*sops\.ya?ml|.*\.tpl\.ya?ml)$
      - id: check-json
        exclude: ^terraform/.*\.tfvars\.sops\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/k8s-at-home/sops-pre-commit
    rev: v2.1.2
    hooks:
      - id: forbid-secrets
        files: ^kubernetes/.*\.ya?ml$
        exclude: \.sops\.ya?ml$

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]
        exclude: |
          (?x)^(
            kubernetes/.*\.sops\.ya?ml
            | ansible/.*\.sops\.ya?ml
            | kubernetes/flux-system/.*
          )$

  - repo: https://github.com/ansible/ansible-lint
    rev: v25.1.0
    hooks:
      - id: ansible-lint
        files: ^ansible/(playbooks|roles)/.+\.(ya?ml)$

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args: [--args=-no-color]
      - id: terraform_tflint

  - repo: https://github.com/yannh/kubeconform
    rev: v0.6.7
    hooks:
      - id: kubeconform
        args:
          - -strict
          - -ignore-missing-schemas
          - -kubernetes-version=1.31.0
        files: ^kubernetes/.*\.ya?ml$
        exclude: |
          (?x)^(
            kubernetes/.*\.sops\.ya?ml
            | kubernetes/.*/values\.ya?ml
            | kubernetes/.*kustomization\.ya?ml
            | kubernetes/flux-system/.*
          )$
