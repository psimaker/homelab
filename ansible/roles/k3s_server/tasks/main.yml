---
- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render k3s server config.yaml
  ansible.builtin.template:
    src: server-config.yaml.j2
    dest: "{{ k3s_config_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart k3s

- name: Fetch k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    mode: "0755"

- name: Detect installed k3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: _k3s_installed_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install or upgrade k3s server
  ansible.builtin.command: "{{ k3s_install_script_path }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "server"
    K3S_TOKEN: "{{ k3s_token }}"
    K3S_KUBECONFIG_MODE: "0640"
  when: k3s_version not in (_k3s_installed_version.stdout | default(''))
  register: _k3s_install
  changed_when: _k3s_install.rc == 0
  no_log: true

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for kubeconfig to materialise
  ansible.builtin.wait_for:
    path: "{{ k3s_kubeconfig_remote_path }}"
    timeout: 120

- name: Wait for the node to register
  ansible.builtin.command:
    cmd: "k3s kubectl get nodes -o name"
  register: _k3s_nodes
  retries: 30
  delay: 4
  until: _k3s_nodes.rc == 0 and _k3s_nodes.stdout | length > 0
  changed_when: false

- name: Fetch kubeconfig back to the controller
  when: k3s_fetch_kubeconfig | bool
  block:

    - name: Slurp remote kubeconfig
      ansible.builtin.slurp:
        src: "{{ k3s_kubeconfig_remote_path }}"
      register: _k3s_kubeconfig_b64

    - name: Materialise sanitised kubeconfig locally
      ansible.builtin.copy:
        content: >-
          {{
            (_k3s_kubeconfig_b64.content | b64decode)
            | regex_replace('https://127\.0\.0\.1:6443', 'https://' ~ tailscale_ip ~ ':6443')
          }}
        dest: "{{ k3s_kubeconfig_local_path }}"
        mode: "0600"
      delegate_to: localhost
      become: false

- name: Install kubectl symlink (k3s ships its own kubectl)
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
    force: true

- name: Install helm
  when: k3s_install_helm | bool
  block:

    - name: Check installed helm version
      ansible.builtin.command: /usr/local/bin/helm version --short
      register: _helm_installed
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Download helm tarball
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
        mode: "0644"
      when: helm_version not in (_helm_installed.stdout | default(''))

    - name: Install helm binary
      ansible.builtin.unarchive:
        src: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: /usr/local/bin/
        remote_src: true
        extra_opts:
          - "--strip-components=1"
          - "--wildcards"
          - "*/helm"
        owner: root
        group: root
        mode: "0755"
      when: helm_version not in (_helm_installed.stdout | default(''))

- name: Install flux CLI
  when: k3s_install_flux | bool
  block:

    - name: Check installed flux version
      ansible.builtin.command: /usr/local/bin/flux --version
      register: _flux_installed
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Download flux tarball
      ansible.builtin.get_url:
        url: "https://github.com/fluxcd/flux2/releases/download/{{ flux_version }}/flux_{{ flux_version | regex_replace('^v', '') }}_linux_amd64.tar.gz"
        dest: "/tmp/flux_{{ flux_version }}_linux_amd64.tar.gz"
        mode: "0644"
      when: flux_version not in (_flux_installed.stdout | default(''))

    - name: Install flux binary
      ansible.builtin.unarchive:
        src: "/tmp/flux_{{ flux_version }}_linux_amd64.tar.gz"
        dest: /usr/local/bin/
        remote_src: true
        owner: root
        group: root
        mode: "0755"
        include:
          - flux
      when: flux_version not in (_flux_installed.stdout | default(''))
