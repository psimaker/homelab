---
# --- Promtail --------------------------------------------------------------
promtail_install: true
promtail_user: promtail
promtail_version: "{{ promtail_version | default('3.3.2') }}"
promtail_install_dir: /usr/local/bin
promtail_config_dir: /etc/promtail
promtail_config_path: "{{ promtail_config_dir }}/promtail.yaml"
promtail_positions_path: /var/lib/promtail/positions.yaml
promtail_listen_addr: "{{ tailscale_ip }}:9080"

promtail_loki_url: "{{ loki_push_url }}"
promtail_external_labels:
  cluster: "homelab"
  node: "{{ inventory_hostname }}"
  zone: "{{ 'hetzner-fsn1' if inventory_hostname == 'edge' else 'home-ch' }}"

# Per-host overridable.
promtail_scrape_paths:
  - /var/log/syslog
  - /var/log/auth.log
promtail_scrape_docker: false
promtail_docker_socket: unix:///var/run/docker.sock

# --- Beszel ----------------------------------------------------------------
beszel_agent_install: true
beszel_agent_user: beszel
beszel_agent_version: "{{ beszel_agent_version | default('0.10.0') }}"
beszel_agent_install_dir: /usr/local/bin
beszel_agent_listen_addr: "{{ tailscale_ip }}:45876"
beszel_agent_hub_url: "{{ beszel_hub_url }}"
# The hub-issued public key the agent trusts. Operator pastes it here from the
# Beszel UI on first run; until then the agent is installed but disabled.
beszel_agent_hub_public_key: ""
