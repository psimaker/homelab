---
- name: Ensure promtail user exists
  ansible.builtin.user:
    name: "{{ promtail_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/promtail
    create_home: true
    state: present

- name: Add promtail user to adm and docker groups for log access
  ansible.builtin.user:
    name: "{{ promtail_user }}"
    groups:
      - adm
      - "{{ 'docker' if promtail_scrape_docker else 'systemd-journal' }}"
    append: true

- name: Ensure promtail config directory exists
  ansible.builtin.file:
    path: "{{ promtail_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Initialise promtail status facts
  ansible.builtin.set_fact:
    _promtail_installed: { stdout: "" }

- name: Detect installed promtail version
  ansible.builtin.command: "{{ promtail_install_dir }}/promtail -version"
  register: _promtail_installed
  changed_when: false
  failed_when: false
  check_mode: false

- name: Set promtail download facts
  ansible.builtin.set_fact:
    _promtail_url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    _promtail_archive: "/tmp/promtail-{{ promtail_version }}.zip"
    _promtail_needs_update: "{{ promtail_version not in (_promtail_installed.stdout | string) }}"

- name: Download promtail release
  ansible.builtin.get_url:
    url: "{{ _promtail_url }}"
    dest: "{{ _promtail_archive }}"
    mode: "0644"
  when: _promtail_needs_update | bool

- name: Ensure unzip is available
  ansible.builtin.apt:
    name: unzip
    state: present
  when: _promtail_needs_update | bool

- name: Unpack promtail binary
  ansible.builtin.unarchive:
    src: "{{ _promtail_archive }}"
    dest: "{{ promtail_install_dir }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
    include:
      - promtail-linux-amd64
  when: _promtail_needs_update | bool
  notify: Restart promtail

- name: Symlink promtail binary
  ansible.builtin.file:
    src: "{{ promtail_install_dir }}/promtail-linux-amd64"
    dest: "{{ promtail_install_dir }}/promtail"
    state: link
    force: true

- name: Render promtail config
  ansible.builtin.template:
    src: promtail.yaml.j2
    dest: "{{ promtail_config_path }}"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_user }}"
    mode: "0640"
  notify: Restart promtail

- name: Render promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart promtail

- name: Ensure promtail is enabled and running
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
