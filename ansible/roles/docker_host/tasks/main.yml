---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Docker apt signing key
  ansible.builtin.get_url:
    url: "{{ docker_apt_repo_key_url }}"
    dest: "{{ docker_apt_repo_keyring }}"
    mode: "0644"
    force: false

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by={{ docker_apt_repo_keyring }}] {{ docker_apt_repo_url }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Remove distro-shipped docker.io if present
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-doc
      - docker-compose
      - podman-docker
      - containerd
      - runc
    state: absent
    purge: true

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render /etc/docker/daemon.json
  ansible.builtin.copy:
    content: "{{ docker_daemon_config | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Add operator users to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Ensure Docker is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure external networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
    driver: bridge
  loop: "{{ docker_external_networks }}"

- name: Install Docker Loki log-driver plugin
  community.docker.docker_plugin:
    plugin_name: "{{ docker_loki_plugin_image }}"
    alias: "{{ docker_loki_plugin_alias }}"
    state: enabled
  when: docker_install_loki_plugin | bool
