---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Tailscale apt signing key
  ansible.builtin.get_url:
    url: "{{ tailscale_apt_repo_key_url }}"
    dest: "{{ tailscale_apt_repo_keyring }}"
    mode: "0644"
    force: false

- name: Add Tailscale apt repository
  ansible.builtin.get_url:
    url: "{{ tailscale_apt_repo_list_url }}"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"
    force: true
  register: _tailscale_repo

- name: Update apt cache after Tailscale repo change
  ansible.builtin.apt:
    update_cache: true
  when: _tailscale_repo.changed  # noqa: no-handler — needed before package install

- name: Install Tailscale
  ansible.builtin.apt:
    name: "{{ tailscale_packages }}"
    state: present

- name: Ensure tailscaled is enabled and running
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Read tailscale status as JSON
  ansible.builtin.command: tailscale status --json
  register: _tailscale_status
  changed_when: false
  failed_when: false
  check_mode: false

- name: Decide whether tailscale up needs running
  ansible.builtin.set_fact:
    _tailscale_needs_up: >-
      {{
        _tailscale_status.rc != 0 or
        ((_tailscale_status.stdout | from_json).BackendState | default('Stopped'))
        not in ['Running']
      }}

- name: Bring tailscale up against Headscale
  ansible.builtin.command:
    argv:
      - tailscale
      - up
      - "--login-server={{ tailscale_login_server }}"
      - "--authkey={{ tailscale_authkey }}"
      - "--advertise-tags={{ tailscale_advertise_tags }}"
      - "--hostname={{ inventory_hostname }}"
      - "--accept-dns=false"
      - "{{ '--accept-routes' if tailscale_accept_routes_flag else '--accept-routes=false' }}"
      - "--reset"
  no_log: true
  when: _tailscale_needs_up | bool
  register: _tailscale_up
  changed_when: _tailscale_up.rc == 0
