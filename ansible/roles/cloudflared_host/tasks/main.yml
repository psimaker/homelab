---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Cloudflare apt signing key
  ansible.builtin.get_url:
    url: "{{ cloudflared_apt_repo_key_url }}"
    dest: "{{ cloudflared_apt_repo_keyring }}"
    mode: "0644"
    force: false

- name: Add cloudflared apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ cloudflared_apt_repo_keyring }}] {{ cloudflared_apt_repo_url }} {{ ansible_distribution_release }} main"
    filename: cloudflared
    state: present
    update_cache: true

- name: Install cloudflared
  ansible.builtin.apt:
    name: "{{ cloudflared_packages }}"
    state: present

- name: Ensure cloudflared service user exists
  ansible.builtin.user:
    name: "{{ cloudflared_service_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/cloudflared
    create_home: true
    state: present

- name: Ensure cloudflared config directory exists
  ansible.builtin.file:
    path: "{{ cloudflared_config_dir }}"
    state: directory
    owner: "{{ cloudflared_service_user }}"
    group: "{{ cloudflared_service_user }}"
    mode: "0750"

- name: Drop tunnel token into environment file
  ansible.builtin.copy:
    content: "TUNNEL_TOKEN={{ cloudflared_tunnel_token }}\n"
    dest: "{{ cloudflared_config_dir }}/tunnel.env"
    owner: "{{ cloudflared_service_user }}"
    group: "{{ cloudflared_service_user }}"
    mode: "0600"
  no_log: true
  notify: Restart cloudflared

- name: Render cloudflared systemd unit
  ansible.builtin.template:
    src: cloudflared.service.j2
    dest: /etc/systemd/system/cloudflared.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart cloudflared

- name: Ensure cloudflared is enabled and running
  ansible.builtin.systemd:
    name: cloudflared
    enabled: true
    state: started
    daemon_reload: true
