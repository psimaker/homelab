---
# SOPS-encrypted secrets shared by every host.
#
# This file IS encrypted with age — the YAML below is the plaintext SHAPE
# documented for the operator. The committed copy in the public mirror has
# every value replaced by ciphertext under `sops:` metadata; a real `sops -d`
# is required to read it. Keys never change shape; only values rotate.
#
# Required keys (consumed by roles/*):
#   tailscale_authkey           — pre-auth key from Headscale (`headscale preauthkeys create`)
#   k3s_token                   — node-join token, generated once and reused
#   restic_password             — repository encryption passphrase
#   restic_b2_account_id        — Backblaze B2 application key ID
#   restic_b2_account_key       — Backblaze B2 application key
#   restic_storagebox_password  — SSH password for the Hetzner Storage Box account (only if not using key)
#   cloudflared_tunnel_token    — Tunnel token generated by Cloudflare Zero-Trust
#   ntfy_failure_url            — POST target for backup-failure notifications

tailscale_authkey: "PLACEHOLDER-headscale-preauth-key"
k3s_token: "PLACEHOLDER-32-char-cluster-token"

restic_password: "PLACEHOLDER-restic-passphrase"
restic_b2_account_id: "PLACEHOLDER-b2-key-id"
restic_b2_account_key: "PLACEHOLDER-b2-application-key"
restic_storagebox_password: "PLACEHOLDER-storagebox-password"

cloudflared_tunnel_token: "PLACEHOLDER-cloudflared-tunnel-token"

ntfy_failure_url: "https://ntfy.psimaker.org/homelab-critical"

# --- SOPS metadata block (illustrative — produced by `sops -e`) ------------
# When this file is actually encrypted the top of it will read like:
#
#   tailscale_authkey: ENC[AES256_GCM,data:...,iv:...,tag:...,type:str]
#   k3s_token: ENC[AES256_GCM,data:...,iv:...,tag:...,type:str]
#   ...
#   sops:
#     age:
#       - recipient: age1qzg9z6yq0bootstrapwithagekeygen...
#         enc: |
#           -----BEGIN AGE ENCRYPTED FILE-----
#           YWdlLWVuY3J5cHRpb24ub3JnL3YxCi0+IFgyNTUxOSAk...
#           -----END AGE ENCRYPTED FILE-----
#     lastmodified: "2026-05-10T08:00:00Z"
#     mac: ENC[AES256_GCM,data:...]
#     unencrypted_suffix: _unencrypted
#     version: 3.9.1
#
# The file path matches `ansible/inventory/.*\.sops\.ya?ml$` in .sops.yaml,
# so `sops` will encrypt it whole on `sops -e -i`.
