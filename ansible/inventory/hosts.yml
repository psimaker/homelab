---
# Two-node homelab inventory.
#
# Hosts
#   edge     — Hetzner CX22, k3s server, Tier-1 ingress
#   airbase  — home server, k3s agent + Docker host
#
# Groups
#   edge            — group of one, the Hetzner edge node
#                     (Ansible warns about a same-named group + host;
#                      this is intentional and harmless — the brief
#                      pins the group_vars filename to `edge.yml`)
#   home_dataplane  — group of one, airbase
#   k3s_servers     — children: edge
#   k3s_agents      — children: home_dataplane
#
# `ansible_host` is the address Ansible connects to. For airbase it's the LAN
# IP; for edge it's the Tailscale name once enrolled, the public IPv4 before
# (override on first run with `-e ansible_host=<hetzner-ipv4>`).

all:
  vars:
    ansible_user: umo
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_homelab

  children:

    edge:
      hosts:
        edge:
          ansible_host: edge.tailnet
          tailscale_ip: 100.64.0.1
          k3s_role: server

    home_dataplane:
      hosts:
        airbase:
          ansible_host: 192.168.8.112
          tailscale_ip: 100.64.0.2
          k3s_role: agent

    k3s_servers:
      children:
        edge:

    k3s_agents:
      children:
        home_dataplane:
