---
# Apply only the edge playbook subset.

- name: Configure edge
  hosts: edge
  become: true
  gather_facts: true
  roles:
    - role: baseline
      tags: [baseline]
    - role: tailscale_node
      tags: [tailscale, tailscale_node]
    - role: cloudflared_host
      when: cloudflared_host_install | bool
      tags: [cloudflared, cloudflared_host]
    - role: observability_agent
      tags: [observability, observability_agent]
    - role: k3s_server
      tags: [k3s, k3s_server]
