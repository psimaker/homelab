# Media stack: media server and automation behind VPN

networks:
  proxy:
    external: true
  vpn:
    name: vpn

services:
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE}
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASSWORD}
    ports:
      - "8888:8888"   # HTTP proxy
      - "7878:7878"   # Radarr
      - "8989:8989"   # Sonarr
      - "9696:9696"   # Prowlarr
    networks:
      - vpn
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://ifconfig.me"]
      interval: 60s
      timeout: 10s
      retries: 3

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/plex/config:/config
      - /path/to/movies:/movies
      - /path/to/tv:/tv

  radarr:
    image: lscr.io/linuxserver/radarr:5
    container_name: radarr
    restart: unless-stopped
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/radarr:/config
      - /path/to/movies:/movies
      - /path/to/downloads:/downloads
    depends_on:
      gluetun:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr:4
    container_name: sonarr
    restart: unless-stopped
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/sonarr:/config
      - /path/to/tv:/tv
      - /path/to/downloads:/downloads
    depends_on:
      gluetun:
        condition: service_healthy

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1
    container_name: prowlarr
    restart: unless-stopped
    network_mode: service:gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/prowlarr:/config
    depends_on:
      gluetun:
        condition: service_healthy
