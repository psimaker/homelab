services:
  postgres:
    # renovate: datasource=docker
    image: postgres:16
    container_name: n8n_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - n8n_internal  # Postgres bleibt intern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 30s
      timeout: 10s
      retries: 5

  n8n:
    # renovate: datasource=docker
    image: n8nio/n8n:latest
    container_name: n8n_app
    restart: unless-stopped
    environment:
      # Datenbank
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Sicherheit
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      # URL und Port
      N8N_HOST: ${N8N_HOST:-n8n.local}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${WEBHOOK_URL:-https://n8n.your-domain.com}

      # Performance
      NODE_ENV: production
      GENERIC_TIMEZONE: Europe/Berlin
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}

      # Telemetrie & Phone-Home deaktivieren
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_DIAGNOSTICS_CONFIG_FRONTEND: ""
      N8N_DIAGNOSTICS_CONFIG_BACKEND: ""
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      EXTERNAL_FRONTEND_HOOKS_URLS: ""
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/files
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n_internal
      - default
      - proxy-net
    # ports:
    #   - "5678:5678"
    labels:
      - "traefik.enable=false"
      - "nginxproxymanager.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


volumes:
  postgres_data:
  n8n_data:
  n8n_files:

networks:
  proxy-net:
    external: true
  n8n_internal:
    driver: bridge
