# Automation stack: workflow engine and password manager

networks:
  proxy:
    external: true
  internal:
    external: true

services:
  n8n:
    image: n8nio/n8n:1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${DOMAIN}
      - N8N_PROTOCOL=https
      - GENERIC_TIMEZONE=${TZ}
    networks:
      - proxy
      - internal

  vaultwarden:
    image: vaultwarden/server:1
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "8222:80"
    volumes:
      - ./data/vaultwarden:/data
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - SIGNUPS_ALLOWED=false
    networks:
      - proxy
