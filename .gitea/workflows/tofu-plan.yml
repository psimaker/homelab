---
name: tofu-plan

# Runs `tofu fmt -check`, `tofu init`, `tofu validate`, `tofu plan` for every
# PR that touches terraform/. The plan output is rendered as a PR comment so
# a reviewer can see exactly what will change before merging.
#
# Apply (auto-approve) lives in tofu-apply.yml; this workflow is read-only
# against cloud APIs (refresh-only).

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".gitea/workflows/tofu-plan.yml"

defaults:
  run:
    shell: bash
    working-directory: terraform/live/prod

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # SOPS_AGE_KEY allows OpenTofu to read terraform.tfvars.sops.json via the
  # provider-level sops integration; without it init/validate fail.
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

jobs:

  plan:
    name: tofu plan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          # renovate: datasource=github-releases depName=opentofu/opentofu
          tofu_version: "1.10.0"
          tofu_wrapper: false

      - name: tofu fmt -check
        run: tofu fmt -check -recursive ../..

      - name: tofu init
        run: tofu init -no-color

      - name: tofu validate
        run: tofu validate -no-color

      - name: tofu plan
        id: plan
        run: |
          set -o pipefail
          tofu plan -no-color -lock=false -out=tfplan.bin 2>&1 | tee plan.txt
          # Truncate to 60 KB so the PR comment fits Gitea's limits.
          head -c 60000 plan.txt > plan-trunc.txt
          if [[ $(wc -c < plan.txt) -gt 60000 ]]; then
            printf '\n[... truncated; see workflow logs for full plan ...]\n' \
              >> plan-trunc.txt
          fi

      - name: Upload plan binary
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.pull_request.number }}
          path: terraform/live/prod/tfplan.bin
          retention-days: 14

      - name: Post plan as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITEA_API: ${{ format('{0}/api/v1', github.server_url) }}
        run: |
          set -euo pipefail
          body_file=$(mktemp)
          {
            printf '## tofu plan\n\n'
            printf '**Working dir:** `terraform/live/prod`\n\n'
            printf '<details><summary>Click to expand plan output</summary>\n\n'
            printf '```hcl\n'
            cat plan-trunc.txt
            printf '\n```\n\n</details>\n'
          } > "${body_file}"
          curl -sSf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${GITEA_API}/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --data "$(jq -Rs '{body: .}' < "${body_file}")"
