# Core infrastructure: reverse proxy, container management, updates, notifications

networks:
  proxy:
    name: proxy
  internal:
    name: internal
    internal: true

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data/npm/data:/data
      - ./data/npm/letsencrypt:/etc/letsencrypt
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

  portainer:
    image: portainer/portainer-ce:2.21.5
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - proxy

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 4 * * *
      - WATCHTOWER_NOTIFICATIONS=gotify
      - WATCHTOWER_NOTIFICATION_GOTIFY_URL=http://gotify:80
      - WATCHTOWER_NOTIFICATION_GOTIFY_TOKEN=${GOTIFY_APP_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  gotify:
    image: gotify/server:2.5
    container_name: gotify
    restart: unless-stopped
    ports:
      - "8070:80"
    volumes:
      - ./data/gotify:/app/data
    networks:
      - proxy
