# SOPS configuration — defines which files are SOPS-encrypted and with which age recipients.
#
# Bootstrap (one-time):
#   $ age-keygen -o ~/.config/sops/age/keys.txt
#   $ grep "public key:" ~/.config/sops/age/keys.txt
#   → put the public key (age1...) into the &admin anchor below
#   → re-encrypt all *.sops.* files with `find . -name '*.sops.*' -exec sops updatekeys {} \;`
#
# Cluster-bound key (in-cluster Flux decryptor) lives at namespace flux-system, secret sops-age,
# key age.agekey. It is added as a second recipient so Flux can decrypt without operator intervention.
# See docs/adr/0004-secrets-sops-vs-vault.md and scripts/bootstrap-secrets.sh.

keys:
  - &admin     age1qzg9z6yq0bootstrapwithagekeygenthenupdatethisanchorxxxxxxxxxx
  - &cluster   age1clusterkeylivesinflux-systemsopsageregeneratedonbootstrapxxxx

creation_rules:
  # All Kubernetes Secret manifests under kubernetes/ — encrypt only data/stringData
  - path_regex: kubernetes/.*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    key_groups:
      - age:
          - *admin
          - *cluster

  # Ansible inventory secrets — encrypt entire file
  - path_regex: ansible/inventory/.*\.sops\.ya?ml$
    key_groups:
      - age:
          - *admin

  # Terraform tfvars secrets — encrypt entire JSON file
  - path_regex: terraform/.*\.tfvars\.sops\.json$
    key_groups:
      - age:
          - *admin

  # Generic catch-all for anything explicitly named *.sops.*
  - path_regex: \.sops\.(ya?ml|json|env|toml|ini)$
    key_groups:
      - age:
          - *admin
